services:
  mysql:
    image: mysql:8.0
    container_name: query-quest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: queryquest
      MYSQL_USER: queryquest
      MYSQL_PASSWORD: queryquest
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d


  mysql-client:
    image: mysql:8.0
    container_name: query-quest-mysql-client
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: queryquest
    command: >
      bash -c "
        echo 'MySQL Client Container Ready';
        echo 'Available commands:';
        echo '  mysql -h mysql -u root -p (password: password)';
        echo '  mysql -h mysql -u queryquest -p (password: queryquest)';
        echo '  mysql -h mysql -u root -ppassword queryquest (direct connect)';
        echo '';
        echo 'Container shell ready...';
        tail -f /dev/null
      "
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - default

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: query-quest-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: password
    ports:
      - "8080:80"

volumes:
  mysql_data:
